<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teulue — Bientôt</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --violet: #6B21A8;
      --violet-light: #A855F7;
      --violet-pale: #F3E8FF;
      --violet-mid: #E9D5FF;
      --white: #FEFEFE;
      --text-dark: #1e1033;
      --text-muted: #7c6a94;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--white);
      color: var(--text-dark);
      overflow-x: hidden;
    }

    /* Background ambiance */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 0%, #f3e8ff88 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 100%, #e9d5ff66 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 50% 50%, #faf5ff44 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
    }

    /* Floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
      animation: float 10s ease-in-out infinite;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: var(--violet);
      top: -150px; left: -150px;
      animation-delay: 0s;
    }
    .orb-2 {
      width: 350px; height: 350px;
      background: var(--violet-light);
      bottom: -100px; right: -100px;
      animation-delay: -4s;
    }
    .orb-3 {
      width: 200px; height: 200px;
      background: #c084fc;
      top: 50%; left: 60%;
      animation-delay: -7s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    /* Layout */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    /* Top badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--violet-pale);
      border: 1px solid var(--violet-mid);
      color: var(--violet);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 6px 18px;
      border-radius: 100px;
      margin-bottom: 2.5rem;
      animation: fadeDown 0.8s ease both;
    }
    .badge-dot {
      width: 6px; height: 6px;
      background: var(--violet-light);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    /* Logo / name */
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(4rem, 14vw, 9rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--text-dark);
      margin-bottom: 0.3rem;
      animation: fadeUp 0.9s ease 0.1s both;
      position: relative;
    }
    .logo span {
      color: var(--violet);
    }

    /* Thin divider line */
    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--violet-light), transparent);
      margin: 1.8rem auto;
      animation: fadeUp 0.9s ease 0.2s both;
    }

    /* Main headline */
    .headline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.1rem, 3.5vw, 1.9rem);
      font-weight: 400;
      color: var(--text-dark);
      letter-spacing: 0.01em;
      line-height: 1.5;
      max-width: 480px;
      margin-bottom: 1rem;
      animation: fadeUp 0.9s ease 0.3s both;
    }

    .sub {
      font-size: clamp(0.85rem, 2vw, 1rem);
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      max-width: 360px;
      line-height: 1.7;
      margin-bottom: 3rem;
      animation: fadeUp 0.9s ease 0.4s both;
    }

    /* Cards row */
    .cards {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 3.5rem;
      animation: fadeUp 0.9s ease 0.5s both;
    }

    .card {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(12px);
      border: 1px solid var(--violet-mid);
      border-radius: 16px;
      padding: 1.4rem 1.8rem;
      min-width: 140px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(107,33,168,0.12);
    }
    .card-icon {
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
    }
    .card-label {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* Ownership line */
    .ownership {
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      animation: fadeUp 0.9s ease 0.6s both;
      margin-bottom: 2rem;
    }
    .ownership strong {
      color: var(--violet);
      font-weight: 500;
    }

    /* Decorative bottom line */
    .bottom-line {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--violet-light), var(--violet), var(--violet-light), transparent);
      animation: shimmer 3s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* Decorative corner marks */
    .corner {
      position: fixed;
      width: 30px; height: 30px;
      border-color: var(--violet-mid);
      border-style: solid;
      opacity: 0.5;
    }
    .corner-tl { top: 20px; left: 20px; border-width: 1px 0 0 1px; }
    .corner-tr { top: 20px; right: 20px; border-width: 1px 1px 0 0; }
    .corner-bl { bottom: 20px; left: 20px; border-width: 0 0 1px 1px; }
    .corner-br { bottom: 20px; right: 20px; border-width: 0 1px 1px 0; }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .cards { gap: 0.7rem; }
      .card { padding: 1rem 1.2rem; min-width: 100px; }
      .corner { display: none; }
      .orb-1 { width: 300px; height: 300px; }
      .orb-2 { width: 200px; height: 200px; }
    }

    @media (min-width: 1024px) {
      .logo { font-size: 10rem; }
    }
  </style>
</head>
<body>

  <!-- Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Corner decorations -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Bottom accent line -->
  <div class="bottom-line"></div>

  <main class="page">

    <div class="badge">
      <span class="badge-dot"></span>
      Ce domaine appartient à Teulue
    </div>

    <h1 class="logo">Teu<span>lue</span></h1>

    <div class="divider"></div>

    <p class="headline">Site en construction</p>

    <p class="sub">
      De grandes choses sont en approche.<br/>
      Soyez prêt.
    </p>

    <div class="cards">
      <div class="card">
        <div class="card-icon">✐</div>
        <div class="card-label">Design</div>
      </div>
      <div class="card">
        <div class="card-icon">⌨︎</div>
        <div class="card-label">Développement</div>
      </div>
      <div class="card">
        <div class="card-icon">◈</div>
        <div class="card-label">Innovation</div>
      </div>
    </div>

    <p class="ownership">
      Propriété de <strong>Teulue</strong> &nbsp;·&nbsp; teulue.com
    </p>

  </main>

</body>
</html>
